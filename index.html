<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

const PW_KEY = "quelle-hagau-pw";
const API_URL = "/api/messungen";

async function apiGet(pw) {
  const res = await fetch(API_URL, { headers: { "x-app-password": pw } });
  if (res.status === 401) throw new Error("unauthorized");
  if (res.status === 500) throw new Error("not_configured");
  if (!res.ok) throw new Error("network");
  return res.json();
}

async function apiSave(pw, data) {
  const res = await fetch(API_URL, {
    method: "PUT",
    headers: { "x-app-password": pw, "content-type": "application/json" },
    body: JSON.stringify(data),
  });
  if (!res.ok) throw new Error("save_failed");
}

  { id: "2024-04-20", date: "2024-04-20", ph: 5.9, temp: 10.5, schuettung: 8.0, tds: 31, truebung: "klar", wetter: "trocken", sonstiges: "" },

  { id: "2024-06-21", date: "2024-06-21", ph: 5.7, temp: 12.3, schuettung: 7.8, tds: 30, truebung: "klar", wetter: "trocken", sonstiges: "" },
  { id: "2024-07-23", date: "2024-07-23", ph: 5.7, temp: 13.4, schuettung: 8.0, tds: 30, truebung: "klar", wetter: "trocken", sonstiges: "100 kg Akdolit Hydro Karbonat aufgefüllt" },

const TRUEBUNG_OPTIONS = ["klar", "leicht trüb", "trüb"];

function Icon({ children, size = 16, style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
      {children}
    </svg>
  );
}
const IconDroplet = (p) => <Icon {...p}><path d="M12 2s7 7.5 7 12a7 7 0 0 1-14 0c0-4.5 7-12 7-12Z" /></Icon>;
const IconThermometer = (p) => <Icon {...p}><path d="M14 4v10.5a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z" /></Icon>;
const IconGauge = (p) => <Icon {...p}><circle cx="12" cy="12" r="9" /><path d="M12 12 16 8" /></Icon>;
const IconWaves = (p) => <Icon {...p}><path d="M2 8c1.5-2 3.5-2 5 0s3.5 2 5 0 3.5-2 5 0 3.5 2 5 0" /><path d="M2 15c1.5-2 3.5-2 5 0s3.5 2 5 0 3.5-2 5 0 3.5 2 5 0" /></Icon>;
const IconPlus = (p) => <Icon {...p}><path d="M12 5v14M5 12h14" /></Icon>;
const IconTrash = (p) => <Icon {...p}><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6" /></Icon>;
const IconChevronDown = (p) => <Icon {...p}><path d="m6 9 6 6 6-6" /></Icon>;
const IconAlertTriangle = (p) => <Icon {...p}><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z" /><path d="M12 9v4" /><path d="M12 16.5v.01" /></Icon>;
const IconCheckCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></Icon>;
const IconInfo = (p) => <Icon {...p}><circle cx="12" cy="12" r="10" /><path d="M12 16v-4M12 8h.01" /></Icon>;
const IconX = (p) => <Icon {...p}><path d="M18 6 6 18M6 6l12 12" /></Icon>;
const IconCalendarClock = (p) => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2" /><path d="M16 2v4M8 2v4M3 10h18" /></Icon>;

const FIELD_META = {
  ph: { label: "pH-Wert", unit: "", icon: IconDroplet, min: 6.5, max: 9.5, step: 0.1 },
  temp: { label: "Temperatur", unit: "°C", icon: IconThermometer, step: 0.1 },
  schuettung: { label: "Schüttung", unit: "l/min", icon: IconWaves, step: 0.1 },
  tds: { label: "TDS", unit: "ppm", icon: IconGauge, step: 1 },
};

function emptyForm() {
  const today = new Date().toISOString().slice(0, 10);
  return { date: today, ph: "", temp: "", schuettung: "", tds: "", truebung: "klar", wetter: "", sonstiges: "" };
}

function fmtDate(iso) {
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("de-AT", { day: "2-digit", month: "2-digit", year: "numeric" });
}

function addMonths(iso, months) {
  const d = new Date(iso + "T00:00:00");
  d.setMonth(d.getMonth() + months);
  return d.toISOString().slice(0, 10);
}

function phStatus(entry) {
  if (entry.ph == null) return "none";
  if (entry.ph < FIELD_META.ph.min || entry.ph > FIELD_META.ph.max) return "warn";
  return "ok";
}

function Sparkline({ values, color, height = 40 }) {
  const pts = values.map((v, i) => ({ v, i })).filter((p) => p.v != null);
  if (pts.length < 2) {
    return <div style={{ height, display: "flex", alignItems: "center", fontSize: 12, color: "#5C6E68" }}>zu wenig Daten</div>;
  }
  const width = 200;
  const vals = pts.map((p) => p.v);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const path = pts
    .map((p, idx) => {
      const x = (p.i / (values.length - 1)) * width;
      const y = height - ((p.v - min) / range) * (height - 8) - 4;
      return `${idx === 0 ? "M" : "L"}${x.toFixed(1)},${y.toFixed(1)}`;
    })
    .join(" ");
  return (
    <svg viewBox={`0 0 ${width} ${height}`} width="100%" height={height} preserveAspectRatio="none">
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function RippleMark({ size = 120 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 120 120" style={{ opacity: 0.5 }}>
      {[14, 28, 42, 56].map((r, i) => (
        <circle key={r} cx="60" cy="60" r={r} fill="none" stroke="#5FD3BC" strokeOpacity={0.35 - i * 0.06} strokeWidth="1" />
      ))}
      <circle cx="60" cy="60" r="4" fill="#5FD3BC" fillOpacity="0.6" />
    </svg>
  );
}

const labelStyle = { display: "block", fontSize: 11.5, color: "#93A69E", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.05em" };
const inputStyle = {
  width: "100%",
  background: "#0E1918",
  border: "1px solid #24403A",
  borderRadius: 10,
  padding: "10px 11px",
  color: "#EEEFE6",
  fontSize: 14.5,
  fontFamily: "'IBM Plex Mono', monospace",
  boxSizing: "border-box",
};

function EntryCard({ entry, onDelete }) {
  const [open, setOpen] = useState(false);
  const status = phStatus(entry);
  const dotColor = status === "warn" ? "#E7A94C" : status === "ok" ? "#5FD3BC" : "#3E5751";

  return (
    <div style={{ background: "#142623", border: "1px solid #24403A", borderRadius: 14, overflow: "hidden" }}>
      <button
        onClick={() => setOpen((v) => !v)}
        style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", background: "none", border: "none", cursor: "pointer", color: "#EEEFE6" }}
      >
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ width: 9, height: 9, borderRadius: 999, background: dotColor, flexShrink: 0 }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 14.5 }}>{fmtDate(entry.date)}</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 13, color: "#93A69E", fontFamily: "'IBM Plex Mono', monospace" }}>
          {entry.ph != null && <span>pH {entry.ph}</span>}
          <IconChevronDown size={16} style={{ transform: open ? "rotate(180deg)" : "none", transition: "transform 0.15s" }} />
        </div>
      </button>

      {open && (
        <div style={{ padding: "0 14px 14px" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 4 }}>
            {Object.entries(FIELD_META).map(([key, meta]) => (
              <div key={key} style={{ background: "#0E1918", borderRadius: 10, padding: "8px 10px" }}>
                <div style={{ fontSize: 10.5, color: "#93A69E", textTransform: "uppercase", letterSpacing: "0.05em" }}>{meta.label}</div>
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 15, marginTop: 2 }}>
                  {entry[key] != null ? `${entry[key]}${meta.unit ? " " + meta.unit : ""}` : "—"}
                </div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 8, fontSize: 13, color: "#93A69E" }}>
            Trübung: <span style={{ color: "#EEEFE6" }}>{entry.truebung || "—"}</span> · Wetter: <span style={{ color: "#EEEFE6" }}>{entry.wetter || "—"}</span>
          </div>
          {entry.sonstiges && <div style={{ marginTop: 6, fontSize: 13, color: "#EEEFE6", lineHeight: 1.4 }}>{entry.sonstiges}</div>}
          <button
            onClick={onDelete}
            style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 6, background: "none", border: "none", color: "#E2694F", fontSize: 12.5, cursor: "pointer", padding: 0 }}
          >
            <IconTrash size={13} /> Messung löschen
          </button>
        </div>
      )}
    </div>
  );
}

function PasswordGate({ onSubmit, error, checking }) {
  const [pw, setPw] = useState("");
  return (
    <div style={{ background: "#0E1918", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Inter', sans-serif", padding: 20 }}>
      <form
        onSubmit={(e) => { e.preventDefault(); onSubmit(pw); }}
        style={{ width: "100%", maxWidth: 340, background: "#142623", border: "1px solid #24403A", borderRadius: 18, padding: 24 }}
      >
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 8 }}>
          <RippleMark size={72} />
        </div>
        <div style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 22, color: "#EEEFE6", textAlign: "center" }}>Quelle Hagau</div>
        <div style={{ fontSize: 13, color: "#93A69E", textAlign: "center", marginTop: 4, marginBottom: 18 }}>Zugangspasswort für diese Gerät eingeben</div>
        <input
          type="password"
          value={pw}
          onChange={(e) => setPw(e.target.value)}
          style={inputStyle}
          placeholder="Passwort"
          autoFocus
        />
        {error && <div style={{ color: "#E2694F", fontSize: 12.5, marginTop: 8 }}>{error}</div>}
        <button
          type="submit"
          disabled={checking}
          style={{ marginTop: 14, width: "100%", background: "#5FD3BC", color: "#0E1918", fontWeight: 600, fontSize: 15, padding: "12px 0", borderRadius: 12, border: "none", cursor: checking ? "default" : "pointer", opacity: checking ? 0.7 : 1 }}
        >
          {checking ? "Prüfe …" : "Anmelden"}
        </button>
      </form>
    </div>
  );
}

function QuellenApp() {
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [formOpen, setFormOpen] = useState(false);
  const [form, setForm] = useState(emptyForm());
  const [infoOpen, setInfoOpen] = useState(false);
  const [saveError, setSaveError] = useState("");
  const [authenticated, setAuthenticated] = useState(false);
  const [authError, setAuthError] = useState("");
  const [checking, setChecking] = useState(false);
  const [password, setPassword] = useState("");

  async function login(pw) {
    setChecking(true);
    setAuthError("");
    try {
      const data = await apiGet(pw);
      window.localStorage.setItem(PW_KEY, pw);
      setPassword(pw);
      setAuthenticated(true);
      if (data) {
        setEntries(data);
      } else {
        await apiSave(pw, SEED);
        setEntries(SEED);
      }
    } catch (e) {
      if (e.message === "unauthorized") setAuthError("Falsches Passwort.");
      else if (e.message === "not_configured") setAuthError("Server-Passwort ist in Netlify noch nicht als Umgebungsvariable APP_PASSWORD hinterlegt.");
      else setAuthError("Verbindung fehlgeschlagen — läuft die Function bereits auf Netlify?");
    } finally {
      setChecking(false);
      setLoading(false);
    }
  }

  useEffect(() => {
    const savedPw = window.localStorage.getItem(PW_KEY);
    if (savedPw) login(savedPw);
    else setLoading(false);
  }, []);

  const sorted = useMemo(() => [...entries].sort((a, b) => a.date.localeCompare(b.date)), [entries]);
  const reverseSorted = useMemo(() => [...sorted].reverse(), [sorted]);
  const latest = reverseSorted[0];
  const nextDue = latest ? addMonths(latest.date, 2) : null;
  const overdue = nextDue ? new Date(nextDue) < new Date(new Date().toISOString().slice(0, 10)) : false;

  async function persist(next) {
    setEntries(next);
    try {
      await apiSave(password, next);
      setSaveError("");
    } catch (e) {
      setSaveError("Speichern fehlgeschlagen — bitte Internetverbindung prüfen und erneut versuchen.");
    }
  }

  if (!authenticated) {
    return <PasswordGate onSubmit={login} error={authError} checking={checking} />;
  }

  function submit(e) {
    e.preventDefault();
    if (!form.date) return;
    const entry = {
      id: form.date,
      date: form.date,
      ph: form.ph === "" ? null : parseFloat(form.ph),
      temp: form.temp === "" ? null : parseFloat(form.temp),
      schuettung: form.schuettung === "" ? null : parseFloat(form.schuettung),
      tds: form.tds === "" ? null : parseFloat(form.tds),
      truebung: form.truebung,
      wetter: form.wetter,
      sonstiges: form.sonstiges,
    };
    const withoutDupe = entries.filter((en) => en.id !== entry.id);
    persist([...withoutDupe, entry]);
    setForm(emptyForm());
    setFormOpen(false);
  }

  function removeEntry(id) {
    persist(entries.filter((en) => en.id !== id));
  }

  return (
    <div style={{ background: "#0E1918", minHeight: "100vh", fontFamily: "'Inter', sans-serif", color: "#EEEFE6" }}>
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "20px 16px 80px" }}>
        <div style={{ position: "relative", padding: "24px 20px", borderRadius: 20, background: "linear-gradient(160deg, #142623 0%, #0E1918 100%)", border: "1px solid #24403A", overflow: "hidden" }}>
          <div style={{ position: "absolute", right: -20, top: -20 }}>
            <RippleMark />
          </div>
          <div style={{ fontFamily: "'Fraunces', serif", fontSize: 13, letterSpacing: "0.14em", textTransform: "uppercase", color: "#93A69E" }}>Quellendokumentation</div>
          <div style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 30, marginTop: 4, color: "#EEEFE6" }}>Quelle Hagau</div>

          <div style={{ marginTop: 16, display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
            {latest ? (
              phStatus(latest) === "warn" ? (
                <span style={{ display: "flex", alignItems: "center", gap: 6, background: "rgba(231,169,76,0.15)", color: "#E7A94C", padding: "5px 10px", borderRadius: 999, fontSize: 13 }}>
                  <IconAlertTriangle size={14} /> pH außerhalb Richtwert
                </span>
              ) : phStatus(latest) === "ok" ? (
                <span style={{ display: "flex", alignItems: "center", gap: 6, background: "rgba(95,211,188,0.15)", color: "#5FD3BC", padding: "5px 10px", borderRadius: 999, fontSize: 13 }}>
                  <IconCheckCircle size={14} /> Innerhalb Richtwert
                </span>
              ) : (
                <span style={{ color: "#93A69E", fontSize: 13 }}>Letzte Messung ohne pH-Wert</span>
              )
            ) : null}
          </div>

          {latest && (
            <div style={{ marginTop: 4, fontSize: 13, color: overdue ? "#E2694F" : "#93A69E", display: "flex", alignItems: "center", gap: 6 }}>
              <IconCalendarClock size={14} />
              Letzte Messung {fmtDate(latest.date)} · {overdue ? "nächste Messung überfällig" : `nächste Messung ab ${fmtDate(nextDue)}`}
            </div>
          )}
        </div>

        <button
          onClick={() => setInfoOpen((v) => !v)}
          style={{ display: "flex", alignItems: "center", gap: 6, background: "none", border: "none", color: "#93A69E", fontSize: 12, marginTop: 10, padding: "6px 2px", cursor: "pointer" }}
        >
          <IconInfo size={13} /> Richtwerte &amp; Hinweis
        </button>
        {infoOpen && (
          <div style={{ fontSize: 12.5, color: "#93A69E", background: "#142623", border: "1px solid #24403A", borderRadius: 12, padding: 12, marginTop: 4, lineHeight: 1.5 }}>
            pH 6,5–9,5 ist als grobe Orientierung an der österreichischen Trinkwasserverordnung hinterlegt und dient nur der eigenen Verlaufskontrolle — keine Rechts- oder Trinkwasserfreigabe. Für eine verbindliche Beurteilung zählt die amtliche Untersuchung.
            <div style={{ marginTop: 8 }}>Die Messdaten liegen zentral auf Netlify und sind auf jedem Gerät mit dem Zugangspasswort abrufbar.</div>
            <button
              onClick={() => { window.localStorage.removeItem(PW_KEY); setAuthenticated(false); }}
              style={{ marginTop: 8, background: "none", border: "none", color: "#5FD3BC", fontSize: 12.5, cursor: "pointer", padding: 0 }}
            >
              Anderes Passwort verwenden
            </button>
          </div>
        )}

        {sorted.length > 1 && (
          <div style={{ marginTop: 20, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <div style={{ background: "#142623", border: "1px solid #24403A", borderRadius: 14, padding: "12px 14px" }}>
              <div style={{ fontSize: 11, color: "#93A69E", textTransform: "uppercase", letterSpacing: "0.08em" }}>pH-Verlauf</div>
              <Sparkline values={sorted.map((e) => e.ph)} color="#5FD3BC" />
            </div>
            <div style={{ background: "#142623", border: "1px solid #24403A", borderRadius: 14, padding: "12px 14px" }}>
              <div style={{ fontSize: 11, color: "#93A69E", textTransform: "uppercase", letterSpacing: "0.08em" }}>Schüttung l/min</div>
              <Sparkline values={sorted.map((e) => e.schuettung)} color="#C7D66B" />
            </div>
          </div>
        )}

        <div style={{ marginTop: 20 }}>
          {!formOpen ? (
            <button
              onClick={() => { setForm(emptyForm()); setFormOpen(true); }}
              style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, background: "#5FD3BC", color: "#0E1918", fontWeight: 600, fontSize: 15, padding: "13px 0", borderRadius: 14, border: "none", cursor: "pointer" }}
            >
              <IconPlus size={18} /> Neue Messung erfassen
            </button>
          ) : (
            <form onSubmit={submit} style={{ background: "#142623", border: "1px solid #24403A", borderRadius: 16, padding: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <div style={{ fontFamily: "'Fraunces', serif", fontSize: 17, fontWeight: 600 }}>Neue Messung</div>
                <button type="button" onClick={() => setFormOpen(false)} style={{ background: "none", border: "none", color: "#93A69E", cursor: "pointer" }}>
                  <IconX size={18} />
                </button>
              </div>

              <label style={labelStyle}>Datum</label>
              <input type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} style={inputStyle} required />

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 10 }}>
                {Object.entries(FIELD_META).map(([key, meta]) => (
                  <div key={key}>
                    <label style={labelStyle}>{meta.label} {meta.unit && `(${meta.unit})`}</label>
                    <input
                      type="number"
                      step={meta.step}
                      value={form[key]}
                      onChange={(e) => setForm({ ...form, [key]: e.target.value })}
                      style={inputStyle}
                      placeholder="—"
                    />
                  </div>
                ))}
              </div>

              <label style={{ ...labelStyle, marginTop: 10 }}>Trübung</label>
              <select value={form.truebung} onChange={(e) => setForm({ ...form, truebung: e.target.value })} style={inputStyle}>
                {TRUEBUNG_OPTIONS.map((o) => (
                  <option key={o} value={o}>{o}</option>
                ))}
              </select>

              <label style={{ ...labelStyle, marginTop: 10 }}>Wetter</label>
              <input type="text" value={form.wetter} onChange={(e) => setForm({ ...form, wetter: e.target.value })} style={inputStyle} placeholder="z. B. trocken, Regen" />

              <label style={{ ...labelStyle, marginTop: 10 }}>Sonstiges</label>
              <textarea value={form.sonstiges} onChange={(e) => setForm({ ...form, sonstiges: e.target.value })} style={{ ...inputStyle, minHeight: 60, resize: "vertical" }} placeholder="Beobachtungen, Wartung, Materialtausch …" />

              <button type="submit" style={{ marginTop: 14, width: "100%", background: "#5FD3BC", color: "#0E1918", fontWeight: 600, fontSize: 15, padding: "12px 0", borderRadius: 12, border: "none", cursor: "pointer" }}>
                Messung speichern
              </button>
              {saveError && <div style={{ color: "#E2694F", fontSize: 12, marginTop: 8 }}>{saveError}</div>}
            </form>
          )}
        </div>

        <div style={{ marginTop: 26 }}>
          <div style={{ fontFamily: "'Fraunces', serif", fontSize: 17, fontWeight: 600, marginBottom: 10 }}>Verlauf</div>
          {loading ? (
            <div style={{ color: "#93A69E", fontSize: 14 }}>Lade Messdaten …</div>
          ) : reverseSorted.length === 0 ? (
            <div style={{ color: "#93A69E", fontSize: 14 }}>Noch keine Messungen erfasst.</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {reverseSorted.map((en) => (
                <EntryCard key={en.id} entry={en} onDelete={() => removeEntry(en.id)} />
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<QuellenApp />);
</script>
</body>
</html>
